<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Order - ModernStore</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="responsive.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Navigation Bar - Same as index -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <i class="fas fa-store"></i>
                <span>ModernStore</span>
            </div>
            
            <!-- Desktop Navigation Menu -->
            <ul class="nav-menu">
                <li><a href="index.html#home">Home</a></li>
                <li><a href="index.html#products">Products</a></li>
                <li><a href="order.html">Order</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="#" id="adminNavBtn">Admin</a></li>
            </ul>
            
            <!-- Mobile Menu Button -->
            <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
            
            <!-- Mobile Navigation Box -->
            <div class="mobile-nav" id="mobileNav">
                <ul>
                    <li><a href="index.html#home">Home</a></li>
                    <li><a href="index.html#products">Products</a></li>
                    <li><a href="order.html">Order</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="#" id="mobileAdminBtn">Admin</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Order Form Section -->
    <section id="order" class="order-section" style="margin-top: 70px; min-height: calc(100vh - 70px);">
        <div class="container">
            <h2 class="section-title">Place Your Order</h2>
            <div class="order-container">
                <form id="orderForm" class="order-form">
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> Customer Name *</label>
                        <input type="text" id="customerName" required placeholder="Enter your full name">
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-map-marker-alt"></i> Delivery Address *</label>
                        <textarea id="address" required placeholder="Enter complete delivery address"></textarea>
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-phone"></i> Phone Number *</label>
                        <input type="tel" id="phone" required placeholder="Enter your phone number">
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-box"></i> Select Product *</label>
                        <select id="productSelect" required>
                            <option value="">Choose a product</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-sort-amount-up"></i> Quantity *</label>
                        <input type="number" id="quantity" min="1" value="1" required>
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-calendar"></i> Delivery Date *</label>
                        <input type="date" id="deliveryDate" required>
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-clock"></i> Time Slot *</label>
                        <select id="timeSlot" required>
                            <option value="">Select time slot</option>
                            <option value="9:00 AM - 12:00 PM">9:00 AM - 12:00 PM</option>
                            <option value="12:00 PM - 3:00 PM">12:00 PM - 3:00 PM</option>
                            <option value="3:00 PM - 6:00 PM">3:00 PM - 6:00 PM</option>
                            <option value="6:00 PM - 9:00 PM">6:00 PM - 9:00 PM</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-dollar-sign"></i> Total Amount</label>
                        <input type="text" id="totalAmount" readonly disabled>
                    </div>

                    <button type="submit" class="submit-btn">
                        <i class="fas fa-check-circle"></i> Submit Order
                    </button>
                </form>
            </div>
        </div>
    </section>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner"></div>
        <p>Processing...</p>
    </div>

    <!-- Scripts - ORDER MATTERS for Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="script.js"></script>
    
    <script>
        // Mobile menu toggle for Order page
        document.addEventListener('DOMContentLoaded', function() {
            const mobileMenuBtn = document.getElementById('mobileMenuBtn');
            const mobileNav = document.getElementById('mobileNav');
            
            if (mobileMenuBtn && mobileNav) {
                mobileMenuBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    mobileNav.classList.toggle('active');
                    mobileMenuBtn.classList.toggle('active');
                });
                
                document.addEventListener('click', function(event) {
                    if (mobileNav.classList.contains('active')) {
                        if (!mobileNav.contains(event.target) && !mobileMenuBtn.contains(event.target)) {
                            mobileNav.classList.remove('active');
                            mobileMenuBtn.classList.remove('active');
                        }
                    }
                });
                
                const mobileLinks = mobileNav.querySelectorAll('a');
                mobileLinks.forEach(link => {
                    link.addEventListener('click', function() {
                        mobileNav.classList.remove('active');
                        mobileMenuBtn.classList.remove('active');
                    });
                });
            }
            
            // Handle mobile admin button
            const mobileAdminBtn = document.getElementById('mobileAdminBtn');
            if (mobileAdminBtn) {
                mobileAdminBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    const adminNavBtn = document.getElementById('adminNavBtn');
                    if (adminNavBtn) {
                        adminNavBtn.click();
                    }
                });
            }
            
            // Populate products in select dropdown from existing products array
            if (typeof products !== 'undefined' && products.length > 0) {
                const productSelect = document.getElementById('productSelect');
                if (productSelect) {
                    products.forEach(product => {
                        const option = document.createElement('option');
                        option.value = product.id;
                        option.textContent = `${product.name} - $${product.price}`;
                        option.setAttribute('data-price', product.price);
                        productSelect.appendChild(option);
                    });
                }
            }
            
            // Set minimum delivery date
            const dateInput = document.getElementById('deliveryDate');
            if (dateInput) {
                const tomorrow = new Date();
                tomorrow.setDate(tomorrow.getDate() + 1);
                dateInput.min = tomorrow.toISOString().split('T')[0];
            }
            
            // Calculate total on product/quantity change
            const productSelect = document.getElementById('productSelect');
            const quantityInput = document.getElementById('quantity');
            const totalAmount = document.getElementById('totalAmount');
            
            function calculateTotal() {
                if (productSelect && productSelect.value && quantityInput && quantityInput.value) {
                    const selectedOption = productSelect.options[productSelect.selectedIndex];
                    const price = parseFloat(selectedOption.getAttribute('data-price'));
                    const total = price * parseInt(quantityInput.value);
                    if (totalAmount) totalAmount.value = `$${total.toFixed(2)}`;
                } else if (totalAmount) {
                    totalAmount.value = '$0.00';
                }
            }
            
            if (productSelect) productSelect.addEventListener('change', calculateTotal);
            if (quantityInput) quantityInput.addEventListener('input', calculateTotal);
        });
    </script>
</body>
</html>
